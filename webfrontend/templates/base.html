<!DOCTYPE html>
<html lang="{{ locale.split('-')[0] }}" data-theme="{{ theme }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ t.home.pageTitle or t.common.appName }}{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <div class="layout">
    {% include '_header.html' %}
    {% block content %}{% endblock %}
    {% block footer %}
    <footer>
      <span>{{ t.footer.usesTestssl }}</span> <a href="https://testssl.sh/">testssl.sh</a>. <span>{{ t.footer.moreInfo }}</span> <a href="{{ url_for('about') }}">{{ t.common.about }}</a>.
    </footer>
    {% endblock %}
  </div>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <script src="{{ url_for('static', filename='js/custom-select.js') }}"></script>
  {% block body_scripts %}{% endblock %}
</body>
</html>
