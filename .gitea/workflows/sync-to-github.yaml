# Sync this repo to GitHub on push to main or on tags vMAJOR.MINOR.PATCH (e.g. v1.0.0, v1.0.0-beta).
# Pushes branch main and matching version tags to GitHub, excluding .gitea and internal/.
#
# Required in Gitea (Settings → Secrets and Variables):
#   Secret:   SYNC_GITHUB_TOKEN  — GitHub Personal Access Token with repo scope
#   Variable: SYNC_GITHUB_REPO  — GitHub repo as "owner/repo" (e.g. octocat/my-repo)
#   (Names cannot start with GITEA_ or GITHUB_)

name: Sync to GitHub

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  sync:
    runs-on: docker-build
    steps:
      - name: Checkout repository
        uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "Gitea Sync"
          git config user.email "sync@gitea.local"

      - name: Remove .gitea and internal (do not sync to GitHub)
        run: |
          rm -rf .gitea internal
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: exclude .gitea and internal from GitHub sync"
          fi

      - name: Push main to GitHub
        env:
          GH_URL: "https://x-access-token:${{ secrets.SYNC_GITHUB_TOKEN }}@github.com/${{ vars.SYNC_GITHUB_REPO }}.git"
        run: |
          git remote add github "$GH_URL" 2>/dev/null || git remote set-url github "$GH_URL"
          git push --force github HEAD:main

      - name: Push version tags (vX.Y.Z or vX.Y.Z-suffix) to GitHub
        env:
          GH_URL: "https://x-access-token:${{ secrets.SYNC_GITHUB_TOKEN }}@github.com/${{ vars.SYNC_GITHUB_REPO }}.git"
        run: |
          git remote add github "$GH_URL" 2>/dev/null || git remote set-url github "$GH_URL"
          tags=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$' || true)
          if [ -n "$tags" ]; then
            for tag in $tags; do
              git push github "$tag" || true
            done
          fi
